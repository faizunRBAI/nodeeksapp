name: Deploy to EKS

on:
  workflow_dispatch:

jobs:
  #  Test 
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (advisory)
        run: npm run lint || true
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present

  #  Build 
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build (if applicable)
        run: npm run build --if-present

  #  Docker build & push 
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          REPO: ${{ secrets.PROJECT_NAME }}-app
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecr describe-repositories \
            --repository-names "${REPO}" \
            --region "${AWS_REGION}" > /dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${REPO}" \
            --region "${AWS_REGION}" \
            --image-tag-mutability MUTABLE \
            --image-scanning-configuration scanOnPush=true

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
        continue-on-error: true

      - name: Build, tag, and push Docker image
        id: build_push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}-app
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

  #  Terraform infra + Kubernetes deploy 
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reconstruct image URI
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}-app
          TAG: ${{ github.sha }}
        run: |
          echo "uri=${REGISTRY}/${REPO}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_image_uri: ${{ steps.image.outputs.uri }}
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="image_uri=${TF_VAR_image_uri}"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.PROJECT_NAME }}"

      - name: Wait for LoadBalancer hostname
        id: get_lb
        run: |
          NAMESPACE="${{ secrets.PROJECT_NAME }}"
          echo "Waiting for LoadBalancer hostname..."
          for i in $(seq 1 30); do
            HOSTNAME=$(kubectl get svc app -n "${NAMESPACE}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "${HOSTNAME}" ]; then
              echo "LoadBalancer hostname: ${HOSTNAME}"
              echo "lb_hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Attempt ${i}/30 - not ready yet, waiting 20s..."
            sleep 20
          done
          if [ -z "${HOSTNAME}" ]; then
            echo "ERROR: LoadBalancer hostname not available after 10 minutes."
            exit 1
          fi

      - name: Smoke test - verify app is reachable
        run: |-
          LB_HOST="${{ steps.get_lb.outputs.lb_hostname }}"
          echo "Smoke-testing http://${LB_HOST}/health ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "http://${LB_HOST}/health" || true)
            echo "Attempt ${i}/12 - HTTP ${HTTP_CODE}"
            if echo "${HTTP_CODE}" | grep -qE '^[23]'; then
              echo "Smoke test passed (HTTP ${HTTP_CODE})"
              exit 0
            fi
            sleep 30
          done
          echo "ERROR: Smoke test failed - app did not return 2xx/3xx after 6 minutes."
          exit 1
